services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: starsage
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starsage"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: apply Alembic migrations to the prod DB, then exit. `app` waits for
  # this to finish successfully before starting, so the schema is always at head
  # before the server accepts traffic (and migrations run in exactly one place).
  migrate:
    build: .
    image: starsage:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-root}@db:5432/starsage
    command: ["python", "src/main.py", "migrate"]
    restart: "no"

  app:
    build: .
    image: starsage:latest
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-root}@db:5432/starsage
      STARSAGE_PORT: "8765"
      STARSAGE_SECRET_KEY: ${STARSAGE_SECRET_KEY:-}
    ports:
      - "8765:8765"
    restart: unless-stopped

volumes:
  pgdata:
